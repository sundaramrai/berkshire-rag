services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: berkshire-rag-postgres
    environment:
      POSTGRES_DB: berkshire
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - berkshire_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d berkshire"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  berkshire_pg_data:
